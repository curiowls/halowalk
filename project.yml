name: HaloWalk
options:
  bundleIdPrefix: com.halowalk
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "35"
    ENABLE_PREVIEWS: YES

targets:
  HaloWalk:
    type: application
    platform: iOS
    sources:
      - Shared
      - Guardian
      - Resources
    info:
      path: Guardian/Info.plist
      properties:
        CFBundleDisplayName: HaloWalk
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: ""
          # Center the brand mark on the launch screen so the first frame
          # the user sees is the HaloWalk logo rather than a blank window.
          UIImageName: HaloWalkMark
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Required for region monitoring to fire while the app is backgrounded.
        UIBackgroundModes:
          - location
          - remote-notification
        UIAppFonts:
          - Kalam-Light.ttf
          - Kalam-Regular.ttf
          - Kalam-Bold.ttf
          - Caveat-Regular.ttf
          - Caveat-Bold.ttf
          - ArchitectsDaughter-Regular.ttf
          - PatrickHand-Regular.ttf
          - Quicksand-VF.ttf
          - Inter-VF.ttf
          - FredokaOne-Regular.ttf
          - Nunito-VF.ttf
        NSLocationWhenInUseUsageDescription: HaloWalk uses location to show hubs and halos relative to where family members are.
        NSLocationAlwaysAndWhenInUseUsageDescription: HaloWalk uses location in the background so guardians can see when a family member leaves a halo.
    # Build B: Sign in with Apple + CloudKit container + push
    # (aps-environment is needed for CKSyncEngine's silent-push change
    # notifications). xcodegen owns this file via `properties:`.
    entitlements:
      path: Guardian/HaloWalk.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.halowalk.guardian
        com.apple.developer.icloud-services:
          - CloudKit
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.halowalk.guardian
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: 7JA4MHTFTW
    dependencies:
      - target: HaloWalk Watch App

  HaloWalk Watch App:
    type: application
    platform: watchOS
    sources:
      - Shared
      - Watcher
      - path: Resources/Fonts
        type: folder
      - path: Resources/WatchAssets.xcassets
    info:
      path: Watcher/Info.plist
      properties:
        CFBundleDisplayName: HaloWalk
        ITSAppUsesNonExemptEncryption: false
        WKApplication: true
        WKWatchOnly: false
        WKCompanionAppBundleIdentifier: com.halowalk.guardian
        UIAppFonts:
          - Kalam-Light.ttf
          - Kalam-Regular.ttf
          - Kalam-Bold.ttf
          - Caveat-Regular.ttf
          - Caveat-Bold.ttf
          - ArchitectsDaughter-Regular.ttf
          - PatrickHand-Regular.ttf
          - Quicksand-VF.ttf
          - Inter-VF.ttf
          - FredokaOne-Regular.ttf
          - Nunito-VF.ttf
        NSLocationWhenInUseUsageDescription: HaloWalk uses location to show your halo and route home.
    # Watch gets no new capabilities in Build A — it inherits the Apple
    # identity from the paired phone via WatchSync. CloudKit entitlements
    # land here in Build B.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.halowalk.guardian.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SDKROOT: watchos
        SUPPORTED_PLATFORMS: "watchos watchsimulator"
        DEVELOPMENT_TEAM: 7JA4MHTFTW
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
